<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>关于本机 生成器</title>

<style>
:root{
  --w:390px;
  --h:844px;
  --bg:#f2f2f7;
  --card:#fff;
  --sep:rgba(60,60,67,.12);
  --text:#1c1c1e;
  --value:rgba(60,60,67,.55);
  --radius:18px;
  --font:-apple-system,BlinkMacSystemFont,"PingFang SC","SF Pro Text",sans-serif;
}

body{
  margin:0;
  background:#111;
  font-family:var(--font);
  display:flex;
  justify-content:center;
  padding:20px;
}

/* ===== 固定截图容器 ===== */
#shot{
  width:var(--w);
  height:var(--h);
  background:var(--bg);
  border-radius:32px;
  overflow:hidden;
  position:relative;
}

/* ===== 通用状态栏 ===== */
.statusbar{
  height:44px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  padding:0 18px 6px;
  font-size:16px;
  font-weight:600;
}

.icons{display:flex;gap:8px;font-size:14px}

/* ===== 标题 ===== */
.nav{
  height:52px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:17px;
  font-weight:600;
  position:relative;
}

.back{
  position:absolute;
  left:14px;
  width:34px;height:34px;
  border-radius:17px;
  background:rgba(120,120,128,.12);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
}

/* ===== 内容 ===== */
.content{padding:10px 16px;}

.card{
  background:var(--card);
  border-radius:var(--radius);
  overflow:hidden;
  margin-bottom:12px;
}

.cell{
  padding:16px;
  display:flex;
  justify-content:space-between;
  font-size:16px;
}

.cell+.cell{
  border-top:1px solid var(--sep);
}

.value{color:var(--value)}
</style>
</head>

<body>

<div id="shot">

<div class="statusbar">
  <div id="time">00:19</div>
  <div class="icons">▮▮▮ Wi-Fi 🔋69%</div>
</div>

<div class="nav">
  <div class="back">‹</div>
  关于本机
</div>

<div class="content">
  <div class="card">
    <div class="cell"><span>名称</span><span class="value">iPhone</span></div>
    <div class="cell"><span>iOS 版本</span><span class="value">26.2.1</span></div>
    <div class="cell"><span>型号名称</span><span class="value">iPhone 17 Pro</span></div>
    <div class="cell"><span>型号</span><span class="value">MG934CH/A</span></div>
    <div class="cell"><span>序列号</span><span class="value">MLJT2HWR2R</span></div>
  </div>

  <div class="card">
    <div class="cell"><span style="font-weight:600">有限保修</span>
      <span class="value">到期日期：2026/9/18</span></div>
  </div>

  <div class="card">
    <div class="cell"><span>歌曲</span><span class="value">0</span></div>
    <div class="cell"><span>视频</span><span class="value">328</span></div>
    <div class="cell"><span>照片</span><span class="value">4,748</span></div>
    <div class="cell"><span>应用程序</span><span class="value">146</span></div>
    <div class="cell"><span>总容量</span><span class="value">256 GB</span></div>
    <div class="cell"><span>可用容量</span><span class="value">23.53 GB</span></div>
  </div>
</div>

</div>

<br>

<button id="download">导出 PNG</button>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
document.getElementById("download").onclick = async () => {
  const node = document.getElementById("shot");

  const canvas = await html2canvas(node,{
    width:390,
    height:844,
    scale:3,
    useCORS:true
  });

  const link=document.createElement("a");
  link.download="about-device.png";
  link.href=canvas.toDataURL("image/png");
  link.click();
};
</script>

</body>
</html>
