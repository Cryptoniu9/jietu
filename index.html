<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>关于本机 截图生成器（通用状态栏）</title>
  <style>
    :root{
      --bg:#f2f2f7;
      --card:#ffffff;
      --sep:rgba(60,60,67,.12);
      --text:#1c1c1e;
      --value:rgba(60,60,67,.55);
      --muted:rgba(60,60,67,.45);
      --radius:18px;

      --w:390px;
      --h:844px;

      --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",
             "PingFang SC","Hiragino Sans GB","Microsoft YaHei",Arial,sans-serif;
    }

    body{
      margin:0;
      background:#111;
      color:#fff;
      font-family:var(--font);
      display:flex;
      gap:16px;
      padding:16px;
      justify-content:center;
      align-items:flex-start;
      flex-wrap:wrap;
    }

    /* 控制面板 */
    .panel{
      width:min(520px, 100%);
      background:#1b1b1b;
      border:1px solid #2a2a2a;
      border-radius:14px;
      padding:14px;
    }
    .panel h2{ margin:0 0 10px; font-size:16px; font-weight:600; }
    .grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    label{ display:flex; flex-direction:column; gap:6px; font-size:12px; color:#cfcfcf; }
    input{
      height:38px; border-radius:10px; border:1px solid #333;
      background:#0f0f0f; color:#fff; padding:0 10px; font-size:14px; outline:none;
    }
    .row{ grid-column:1/-1; }
    button{
      height:42px; border-radius:12px; border:1px solid #3a3a3a;
      background:#fff; color:#000; font-weight:800; cursor:pointer;
    }
    .hint{ margin-top:8px; color:#a9a9a9; font-size:12px; line-height:1.5; }

    /* 画布区 */
    .phone{
      width:var(--w);
      height:var(--h);
      background:var(--bg);
      border-radius:34px;
      overflow:hidden;
      box-shadow:0 12px 40px rgba(0,0,0,.45);
      position:relative;
    }

    /* 通用状态栏 */
    .statusbar{
      height:44px;
      padding-top:env(safe-area-inset-top);
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      padding-left:20px;
      padding-right:18px;
      box-sizing:border-box;
      color:#000;
      user-select:none;
    }
    .sb-left{
      font-weight:700;
      font-size:16px;
      letter-spacing:0;
      transform:translateY(1px);
    }
    .sb-right{
      display:flex;
      align-items:center;
      gap:10px;
      transform:translateY(1px);
    }
    .sb-icon svg{ display:block; }

    .battery{
      position:relative;
      width:52px;
      height:18px;
    }
    .battery svg{ width:52px; height:18px; display:block; }
    .bat-text{
      position:absolute;
      left:0; right:7px; top:0; bottom:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:800;
      color:#000;
    }

    /* 导航（这里改细：标题不再粗） */
    .nav{
      height:52px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      color:#000;
      font-size:17px;
      font-weight:600;   /* 关键：从 800 改为 600 */
      letter-spacing:0;
    }
    .back-btn{
      position:absolute;
      left:14px;
      width:34px; height:34px;
      border-radius:17px;
      background:rgba(120,120,128,.12);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#000;
      font-size:20px;
      line-height:1;
      font-weight:600;
    }

    .content{ padding:10px 16px 18px; box-sizing:border-box; }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      overflow:hidden;
      margin-bottom:12px;
    }
    .cell{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:16px 16px;
      font-size:16px;
      color:var(--text);
      position:relative;
      font-weight:400;
    }
    .cell + .cell::before{
      content:"";
      position:absolute;
      top:0;
      left:16px;
      right:0;
      height:1px;
      background:var(--sep);
    }
    .value{
      color:var(--value);
      font-weight:500;
      display:flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
    }
    .chev{
      color:rgba(60,60,67,.28);
      font-size:18px;
      transform:translateY(1px);
      font-weight:500;
    }

    /* “有限保修”标题这里也改细 */
    .w-title{
      font-weight:600;   /* 关键：更接近图里，不要 800 */
    }
    .warranty-right{
      color:var(--value);
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:500;
      white-space:nowrap;
    }
    .warranty-right .label{ color:var(--muted); font-weight:500; }
  </style>
</head>

<body>
  <div class="panel">
    <h2>输入参数</h2>
    <div class="grid">
      <label>时间<input id="t" value="00:19"></label>
      <label>电量 %<input id="bat" value="69"></label>

      <label>信号格数（0-4）<input id="sig" value="4"></label>
      <label>Wi-Fi（0-3）<input id="wifi" value="3"></label>

      <label>名称<input id="name" value="iPhone"></label>
      <label>iOS 版本<input id="ios" value="26.2.1"></label>

      <label class="row">型号名称<input id="modelName" value="iPhone 17 Pro"></label>
      <label>型号<input id="model" value="MG934CH/A"></label>
      <label class="row">序列号<input id="sn" value="MLJT2HWR2R"></label>

      <label>歌曲<input id="songs" value="0"></label>
      <label>视频<input id="videos" value="328"></label>

      <label>照片<input id="photos" value="4,748"></label>
      <label>应用程序<input id="apps" value="146"></label>

      <label>总容量<input id="total" value="256 GB"></label>
      <label>可用容量<input id="avail" value="23.53 GB"></label>

      <label class="row">保修到期<input id="wexp" value="2026/9/18"></label>

      <button class="row" id="download">导出 PNG</button>
    </div>
    <div class="hint">导出后在 Safari 下载列表/文件App里保存到相册。</div>
  </div>

  <div id="shot" class="phone">
    <!-- 通用状态栏 -->
    <div class="statusbar">
      <div class="sb-left" id="timeText">00:19</div>

      <div class="sb-right">
        <!-- signal bars -->
        <span class="sb-icon" aria-hidden="true">
          <svg width="22" height="14" viewBox="0 0 22 14">
            <rect id="s1" x="1"  y="9" width="3" height="4" rx="1" fill="#000"/>
            <rect id="s2" x="6"  y="7" width="3" height="6" rx="1" fill="#000"/>
            <rect id="s3" x="11" y="5" width="3" height="8" rx="1" fill="#000"/>
            <rect id="s4" x="16" y="3" width="3" height="10" rx="1" fill="#000"/>
          </svg>
        </span>

        <!-- wifi -->
        <span class="sb-icon" aria-hidden="true">
          <svg width="20" height="14" viewBox="0 0 20 14">
            <path id="w1" d="M2 5.6C6.9 1.4 13.1 1.4 18 5.6" fill="none" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
            <path id="w2" d="M4.8 8.1C8 5.6 12 5.6 15.2 8.1" fill="none" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
            <path id="w3" d="M7.8 10.4C9.2 9.4 10.8 9.4 12.2 10.4" fill="none" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
            <circle id="w0" cx="10" cy="12.2" r="1.2" fill="#000"/>
          </svg>
        </span>

        <!-- battery -->
        <div class="battery" aria-hidden="true">
          <svg viewBox="0 0 52 18">
            <rect x="1" y="2" width="42" height="14" rx="5" fill="none" stroke="#000" stroke-width="1.6"/>
            <rect x="44.8" y="6" width="5" height="6" rx="2.6" fill="#000"/>
            <rect id="batFill" x="3" y="4" width="0" height="10" rx="4" fill="#000" opacity="0.22"/>
          </svg>
          <div class="bat-text"><span id="batText">69</span></div>
        </div>
      </div>
    </div>

    <div class="nav">
      <div class="back-btn">‹</div>
      关于本机
    </div>

    <div class="content">
      <div class="card">
        <div class="cell">
          <div>名称</div>
          <div class="value"><span id="v_name">iPhone</span><span class="chev">›</span></div>
        </div>
        <div class="cell">
          <div>iOS 版本</div>
          <div class="value"><span id="v_ios">26.2.1</span><span class="chev">›</span></div>
        </div>
        <div class="cell">
          <div>型号名称</div>
          <div class="value"><span id="v_modelName">iPhone 17 Pro</span></div>
        </div>
        <div class="cell">
          <div>型号</div>
          <div class="value"><span id="v_model">MG934CH/A</span></div>
        </div>
        <div class="cell">
          <div>序列号</div>
          <div class="value"><span id="v_sn">MLJT2HWR2R</span></div>
        </div>
      </div>

      <div class="card">
        <div class="cell">
          <div class="w-title">有限保修</div>
          <div class="warranty-right">
            <span class="label">到期日期：</span>
            <span id="v_wexp">2026/9/18</span>
            <span class="chev">›</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="cell"><div>歌曲</div><div class="value"><span id="v_songs">0</span></div></div>
        <div class="cell"><div>视频</div><div class="value"><span id="v_videos">328</span></div></div>
        <div class="cell"><div>照片</div><div class="value"><span id="v_photos">4,748</span></div></div>
        <div class="cell"><div>应用程序</div><div class="value"><span id="v_apps">146</span></div></div>
        <div class="cell"><div>总容量</div><div class="value"><span id="v_total">256 GB</span></div></div>
        <div class="cell"><div>可用容量</div><div class="value"><span id="v_avail">23.53 GB</span></div></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const bind = (id, targetId) => {
      const el = document.getElementById(id);
      const target = document.getElementById(targetId);
      const apply = () => target.textContent = el.value;
      el.addEventListener('input', apply);
      apply();
    };

    bind('t', 'timeText');
    bind('name', 'v_name');
    bind('ios', 'v_ios');
    bind('modelName', 'v_modelName');
    bind('model', 'v_model');
    bind('sn', 'v_sn');
    bind('songs', 'v_songs');
    bind('videos', 'v_videos');
    bind('photos', 'v_photos');
    bind('apps', 'v_apps');
    bind('total', 'v_total');
    bind('avail', 'v_avail');
    bind('wexp', 'v_wexp');

    const batInput = document.getElementById('bat');
    const batText = document.getElementById('batText');
    const batFill = document.getElementById('batFill');

    const sigInput = document.getElementById('sig');
    const wifiInput = document.getElementById('wifi');

    const sigBars = [
      document.getElementById('s1'),
      document.getElementById('s2'),
      document.getElementById('s3'),
      document.getElementById('s4')
    ];
    const wifiParts = [
      document.getElementById('w0'),
      document.getElementById('w1'),
      document.getElementById('w2'),
      document.getElementById('w3')
    ];

    function applyBattery(){
      let v = parseInt(String(batInput.value).replace(/[^\d]/g,''), 10);
      if (isNaN(v)) v = 0;
      v = Math.max(0, Math.min(100, v));
      batText.textContent = String(v);
      const innerMax = 38;
      const w = Math.round(innerMax * (v/100));
      batFill.setAttribute('width', String(w));
      batFill.setAttribute('opacity', v >= 20 ? '0.22' : '0.32');
    }

    function applySignal(){
      let v = parseInt(String(sigInput.value).replace(/[^\d]/g,''), 10);
      if (isNaN(v)) v = 0;
      v = Math.max(0, Math.min(4, v));
      sigBars.forEach((bar, idx)=>{
        bar.setAttribute('opacity', idx < v ? '1' : '0.18');
      });
    }

    function applyWifi(){
      let v = parseInt(String(wifiInput.value).replace(/[^\d]/g,''), 10);
      if (isNaN(v)) v = 0;
      v = Math.max(0, Math.min(3, v));
      wifiParts.forEach(p=>p.setAttribute('opacity','0.18'));
      if (v === 0) return;
      wifiParts[0].setAttribute('opacity','1');
      wifiParts[1].setAttribute('opacity', v>=1 ? '1' : '0.18');
      wifiParts[2].setAttribute('opacity', v>=2 ? '1' : '0.18');
      wifiParts[3].setAttribute('opacity', v>=3 ? '1' : '0.18');
    }

    batInput.addEventListener('input', applyBattery);
    sigInput.addEventListener('input', applySignal);
    wifiInput.addEventListener('input', applyWifi);
    applyBattery(); applySignal(); applyWifi();

    document.getElementById('download').addEventListener('click', async () => {
      const node = document.getElementById('shot');
      const canvas = await html2canvas(node, { scale: 3, backgroundColor: null });
      const a = document.createElement('a');
      a.download = 'about-device.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    });
  </script>
</body>
</html>
